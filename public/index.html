<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Mr_Techy Portfolio" />
    <title>Mr_Techy Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <div id="chat-btn-wrap">
      <button onclick="toggleChat()" 
      style="position:fixed;bottom:20px;
      right:20px;background:#007bff;
      color:white;border:none;
      border-radius:50px;padding:12px 18px;
      cursor:pointer;font-size:15px;
      z-index:9999;box-shadow:
      0 4px 15px rgba(0,0,0,0.2)">
      💬 Chat with us
      </button>
    </div>

    <div id="chat-box" style="display:none;
    position:fixed;bottom:75px;right:20px;
    width:300px;height:400px;background:white;
    border-radius:15px;z-index:9999;
    box-shadow:0 4px 20px rgba(0,0,0,0.2);
    flex-direction:column;">
      <div style="background:#007bff;
      color:white;padding:12px;
      border-radius:15px 15px 0 0;
      font-weight:bold;">
      🤖 Mr Techy Assistant
      </div>
      <div id="chat-messages" 
      style="flex:1;overflow-y:auto;
      padding:10px;height:300px"></div>
      <div style="display:flex;padding:8px;
      border-top:1px solid #eee">
        <input id="chat-input" 
        placeholder="Ask anything..." 
        style="flex:1;padding:8px;
        border:1px solid #ddd;
        border-radius:20px;outline:none"
        onkeypress="if(event.key==='Enter')
        sendChat()"/>
        <button onclick="sendChat()" 
        style="background:#007bff;color:white;
        border:none;border-radius:50%;
        width:35px;height:35px;
        margin-left:5px;cursor:pointer">
        ➤</button>
      </div>
    </div>

    <script>
    // ⚠️ LOCALHOST NAHI CHALEGA VERCEL PE!
    // Apna n8n Production URL daalo yahan
    // Format: https://xxxx.app.n8n.cloud/webhook/data
    const N8N_URL = "http://localhost:5678/webhook/data";

    function toggleChat(){
      const box = document.getElementById('chat-box');
      box.style.display = 
        box.style.display==='flex'?'none':'flex';
    }

    async function sendChat(){
      const input = document.getElementById('chat-input');
      const msg = input.value.trim();
      if(!msg) return;
      input.value='';
      
      addMsg(msg,'user');
      addMsg('Typing...','bot','typing');
      
      try{
        const res = await fetch(N8N_URL,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            chatInput:msg,
            action:'sendMessage'
          })
        });
        const text = await res.text();
        document.getElementById('typing')?.remove();
        try{
          const data = JSON.parse(text);
          addMsg(data.output || text, 'bot');
        }catch(e){
          addMsg(text, 'bot');
        }
      }catch(e){
        document.getElementById('typing')?.remove();
        addMsg('Error! Try again.','bot');
      }
    }

    function addMsg(text, type, id=''){
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  
  // = sign remove karo start se
  let cleanText = text.toString().replace(/^=/, '');
  
  // Markdown formatting
  cleanText = cleanText
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '• $1')
    .replace(/\n/g, '<br>');
  
  div.style.cssText = type==='user' ? 
    'background:#007bff;color:white;padding:8px 12px;border-radius:15px;margin:5px 0;max-width:80%;margin-left:auto;text-align:right;word-wrap:break-word' :
    'background:#f1f1f1;color:#333;padding:10px 14px;border-radius:15px;margin:5px 0;max-width:85%;line-height:1.5;word-wrap:break-word';
  
  if(id) div.id=id;
  div.innerHTML = type==='user' ? 
    div.style.cssText && cleanText : cleanText;
  
  // User message plain text, bot message HTML
  if(type === 'user'){
    div.textContent = text;
  } else {
    div.innerHTML = cleanText;
  }
  
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}
    </script>
  </body>
</html>
